name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build, test, package
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # ── Pull SimHub SDK DLLs from the latest SimHub release ──────────────────────────
      # SimHub publishes a portable zip under github.com/SHWotever/SimHub releases.
      # We download the latest, extract SimHub.Plugins.dll + GameReaderCommon.dll, and
      # drop them into lib/simhub-sdk/ so the plugin can compile. Result is cached per
      # SimHub release tag so we don't re-download the 216 MB zip on every build.
      - name: Resolve latest SimHub release
        id: simhub
        shell: pwsh
        run: |
          $headers = @{ "User-Agent" = "PitStrategy-CI" }
          $latest = Invoke-RestMethod "https://api.github.com/repos/SHWotever/SimHub/releases/latest" -Headers $headers
          $asset = $latest.assets | Where-Object { $_.name -like "*.zip" } | Select-Object -First 1
          if (-not $asset) { throw "No zip asset found in SHWotever/SimHub latest release" }
          "url=$($asset.browser_download_url)" >> $env:GITHUB_OUTPUT
          "tag=$($latest.tag_name)"            >> $env:GITHUB_OUTPUT
          Write-Host "SimHub $($latest.tag_name) -> $($asset.browser_download_url)"

      - name: Cache SimHub SDK DLLs
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: lib/simhub-sdk
          key: simhub-sdk-${{ steps.simhub.outputs.tag }}

      - name: Download and extract SimHub SDK DLLs
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $url = "${{ steps.simhub.outputs.url }}"
          Write-Host "Downloading $url"
          Invoke-WebRequest -Uri $url -OutFile simhub.zip -UseBasicParsing
          New-Item -ItemType Directory -Force -Path simhub-extract | Out-Null
          Expand-Archive -Path simhub.zip -DestinationPath simhub-extract
          $plugins = Get-ChildItem simhub-extract -Recurse -Filter "SimHub.Plugins.dll"   | Select-Object -First 1
          $reader  = Get-ChildItem simhub-extract -Recurse -Filter "GameReaderCommon.dll" | Select-Object -First 1
          if (-not $plugins) { throw "SimHub.Plugins.dll not found in SimHub release zip" }
          if (-not $reader)  { throw "GameReaderCommon.dll not found in SimHub release zip" }
          New-Item -ItemType Directory -Force -Path lib/simhub-sdk | Out-Null
          Copy-Item $plugins.FullName lib/simhub-sdk/ -Force
          Copy-Item $reader.FullName  lib/simhub-sdk/ -Force
          Remove-Item simhub.zip -Force
          Remove-Item simhub-extract -Recurse -Force
          Write-Host "Vendored SimHub SDK DLLs:"
          Get-ChildItem lib/simhub-sdk/

      # ── Build & test ─────────────────────────────────────────────────────────────────
      - name: Restore solution
        run: dotnet restore PitStrategy.sln

      - name: Build Core
        run: dotnet build src\PitStrategy.Core\PitStrategy.Core.csproj -c Release --no-restore

      - name: Test Core
        run: dotnet test tests\PitStrategy.Core.Tests\PitStrategy.Core.Tests.csproj -c Release --no-restore --logger "trx;LogFileName=core.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: tests/PitStrategy.Core.Tests/TestResults/

      - name: Build Plugin
        run: dotnet build src\PitStrategy.Plugin\PitStrategy.Plugin.csproj -c Release --no-restore

      # ── Stage downloadable artifacts (every push, every manual run) ──────────────────
      - name: Compute version label
        id: version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like "refs/tags/v*") {
            "label=$($env:GITHUB_REF_NAME)" >> $env:GITHUB_OUTPUT
          } else {
            $sha = $env:GITHUB_SHA.Substring(0,7)
            "label=dev-$sha" >> $env:GITHUB_OUTPUT
          }

      - name: Stage release contents
        shell: pwsh
        run: |
          $stage = "package-stage"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item "src/PitStrategy.Plugin/bin/Release/PitStrategy.dll" $stage/
          if (Test-Path "dashboards/PitStrategy.simhubdash")               { Copy-Item "dashboards/PitStrategy.simhubdash" $stage/ }
          if (Test-Path "dashboards/PitStrategy.simhubdash.template.json") { Copy-Item "dashboards/PitStrategy.simhubdash.template.json" $stage/ }
          if (Test-Path "docs/INSTALL.md")                                 { Copy-Item "docs/INSTALL.md" $stage/ }
          if (Test-Path "README.md")                                       { Copy-Item "README.md" $stage/ }

      - name: Upload PitStrategy.dll artifact
        uses: actions/upload-artifact@v4
        with:
          name: PitStrategy-${{ steps.version.outputs.label }}-dll
          path: src/PitStrategy.Plugin/bin/Release/PitStrategy.dll
          retention-days: 30

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: PitStrategy-${{ steps.version.outputs.label }}-package
          path: package-stage/
          retention-days: 30

      # ── Tag pushes also create a real GitHub Release ─────────────────────────────────
      - name: Compress release zip
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME
          Compress-Archive -Path "package-stage/*" -DestinationPath "PitStrategy-$version-windows.zip"
          "ZIP_NAME=PitStrategy-$version-windows.zip" >> $env:GITHUB_ENV

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
          generate_release_notes: true
