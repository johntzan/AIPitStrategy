name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build, test, package
    runs-on: windows-latest
    timeout-minutes: 25
    # Needed by softprops/action-gh-release to publish a GitHub Release on tag pushes.
    # The default GITHUB_TOKEN is read-only for `contents` since 2023.
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # ── Pull SimHub SDK DLLs from the latest SimHub release ──────────────────────────
      # SimHub publishes a portable zip under github.com/SHWotever/SimHub releases.
      # We download the latest, extract SimHub.Plugins.dll + GameReaderCommon.dll, and
      # drop them into lib/simhub-sdk/ so the plugin can compile. Result is cached per
      # SimHub release tag so we don't re-download the 216 MB zip on every build.
      - name: Resolve latest SimHub release
        id: simhub
        shell: pwsh
        env:
          # Authenticated GitHub API requests get 1,000/hr per repo; the runner's
          # anonymous limit (60/hr shared across the Azure IP pool) is too tight.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $headers = @{
            "User-Agent"    = "PitStrategy-CI"
            "Authorization" = "Bearer $env:GH_TOKEN"
            "Accept"        = "application/vnd.github+json"
          }
          $latest = Invoke-RestMethod "https://api.github.com/repos/SHWotever/SimHub/releases/latest" -Headers $headers
          $asset = $latest.assets | Where-Object { $_.name -like "*.zip" } | Select-Object -First 1
          if (-not $asset) { throw "No zip asset found in SHWotever/SimHub latest release" }
          "url=$($asset.browser_download_url)" >> $env:GITHUB_OUTPUT
          "tag=$($latest.tag_name)"            >> $env:GITHUB_OUTPUT
          Write-Host "SimHub $($latest.tag_name) -> $($asset.browser_download_url)"

      - name: Cache SimHub SDK DLLs
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: lib/simhub-sdk
          key: simhub-sdk-${{ steps.simhub.outputs.tag }}

      - name: Download and extract SimHub SDK DLLs
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          $url = "${{ steps.simhub.outputs.url }}"
          Write-Host "Downloading $url"
          Invoke-WebRequest -Uri $url -OutFile simhub.zip -UseBasicParsing
          $size = (Get-Item simhub.zip).Length
          Write-Host "Downloaded $size bytes"

          # The SimHub release "zip" actually contains a single Inno Setup installer EXE.
          # Step 1: 7z extract the EXE out of the wrapper zip.
          New-Item -ItemType Directory -Force -Path simhub-extract | Out-Null
          & 7z x simhub.zip "-osimhub-extract" -y 1>$null
          if ($LASTEXITCODE -ne 0) { throw "7z extraction failed with exit $LASTEXITCODE" }

          $installer = Get-ChildItem simhub-extract -Filter "SimHubSetup_*.exe" -Recurse | Select-Object -First 1
          if (-not $installer) { throw "SimHubSetup_*.exe not found inside the SimHub release zip" }
          Write-Host "Installer: $($installer.FullName) ($($installer.Length) bytes)"

          # Step 2: run the Inno Setup installer silently. /VERYSILENT suppresses UI,
          # /SUPPRESSMSGBOXES blocks any modal dialogs, /NORESTART avoids a reboot prompt.
          # Runner has admin rights so the install lands in the default Program Files path.
          Write-Host "Running SimHub installer silently..."
          $proc = Start-Process -FilePath $installer.FullName `
            -ArgumentList "/VERYSILENT","/SUPPRESSMSGBOXES","/NORESTART","/NOICONS" `
            -Wait -PassThru
          Write-Host "Installer exit code: $($proc.ExitCode)"
          if ($proc.ExitCode -ne 0) { throw "SimHub installer failed with exit $($proc.ExitCode)" }

          # Step 3: locate the SDK DLLs in the install dir.
          $candidates = @(
            "C:\Program Files (x86)\SimHub",
            "C:\Program Files\SimHub"
          )
          $simhubInstall = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $simhubInstall) { throw "SimHub install directory not found after silent install" }
          Write-Host "SimHub installed at: $simhubInstall"

          $plugins = Join-Path $simhubInstall "SimHub.Plugins.dll"
          $reader  = Join-Path $simhubInstall "GameReaderCommon.dll"
          if (-not (Test-Path $plugins)) { throw "SimHub.Plugins.dll not found at $plugins" }
          if (-not (Test-Path $reader))  { throw "GameReaderCommon.dll not found at $reader" }

          New-Item -ItemType Directory -Force -Path lib/simhub-sdk | Out-Null
          Copy-Item $plugins lib/simhub-sdk/ -Force
          Copy-Item $reader  lib/simhub-sdk/ -Force

          # Cleanup wrapper zip + extracted installer to keep the workspace small.
          Remove-Item simhub.zip -Force
          Remove-Item simhub-extract -Recurse -Force

          Write-Host "Vendored SimHub SDK DLLs:"
          Get-ChildItem lib/simhub-sdk/ | Format-Table Name, Length -AutoSize

      - name: Upload SimHub SDK DLLs (local inspection)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: simhub-sdk-dlls
          path: lib/simhub-sdk/
          retention-days: 1
          if-no-files-found: warn

      # ── Build & test ─────────────────────────────────────────────────────────────────
      - name: Restore solution
        run: dotnet restore PitStrategy.sln

      - name: Build solution
        run: dotnet build PitStrategy.sln -c Release --no-restore

      - name: Run tests
        run: dotnet test tests\PitStrategy.Plugin.Tests\PitStrategy.Plugin.Tests.csproj -c Release --no-build --logger "trx;LogFileName=plugin.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: tests/PitStrategy.Plugin.Tests/TestResults/

      # ── Stage downloadable artifacts (every push, every manual run) ──────────────────
      - name: Compute version label
        id: version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like "refs/tags/v*") {
            "label=$($env:GITHUB_REF_NAME)" >> $env:GITHUB_OUTPUT
          } else {
            $sha = $env:GITHUB_SHA.Substring(0,7)
            "label=dev-$sha" >> $env:GITHUB_OUTPUT
          }

      - name: Stage release contents
        shell: pwsh
        run: |
          $stage = "package-stage"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item "src/PitStrategy.Plugin/bin/Release/PitStrategy.dll" $stage/
          if (Test-Path "dashboards/PitStrategy.simhubdash")               { Copy-Item "dashboards/PitStrategy.simhubdash" $stage/ }
          if (Test-Path "dashboards/PitStrategy.simhubdash.template.json") { Copy-Item "dashboards/PitStrategy.simhubdash.template.json" $stage/ }
          if (Test-Path "docs/INSTALL.md")                                 { Copy-Item "docs/INSTALL.md" $stage/ }
          if (Test-Path "README.md")                                       { Copy-Item "README.md" $stage/ }

      - name: Upload PitStrategy.dll artifact
        uses: actions/upload-artifact@v4
        with:
          name: PitStrategy-${{ steps.version.outputs.label }}-dll
          path: src/PitStrategy.Plugin/bin/Release/PitStrategy.dll
          retention-days: 30

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: PitStrategy-${{ steps.version.outputs.label }}-package
          path: package-stage/
          retention-days: 30

      # ── Tag pushes also create a real GitHub Release ─────────────────────────────────
      - name: Compress release zip
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME
          Compress-Archive -Path "package-stage/*" -DestinationPath "PitStrategy-$version-windows.zip"
          "ZIP_NAME=PitStrategy-$version-windows.zip" >> $env:GITHUB_ENV

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
          generate_release_notes: true
